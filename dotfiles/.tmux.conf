# TERMINAL SETTINGS ========================================================================
set -g mouse off
# set -g default-terminal "tmux-256color" # <-- seems to mess up paging on mac os in iterm
set -g default-terminal "screen-256color"
set -ga terminal-overrides ',*256col*:Tc' # Allow true color in tmux

# Focus events enabled for terminals that support them
set -g focus-events on


# TMUX SETTINGS ============================================================================
# Use ctrl + 6 as leader key -- it's such too awful to use for anything else, and I have it bound to a
# single keypress on mac/linux.
set -g prefix C-^

# Reload tmux config
unbind r
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Move status bar to top
set-option -g status-position top

# In status bar, show windows in the center
set -g status-justify centre

# Refresh 'status-left' and 'status-right' more often, from every 15s to 3s
set -g status-interval 3

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 2s
set -g display-time 2000

    # COPY MODE
# Better way to enter copy mode
unbind [
bind-key -T prefix ';' copy-mode

# Prefer vim style keys, in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Jump up to my last command prompt -- this is some jank until I get tmux copycat working properly
bind-key -n C-u copy-mode \; send-keys -X search-backward " ~/web"

# Prefer emacs-style keys (standard bash hotkeys), for status bar and command line
set -g status-keys emacs

# Bind ctrl+f to find upward
bind-key -n C-f copy-mode\; command-prompt -p "(search up)" "send -X search-backward '%%'"


# SESSION SETTINGS =========================================================================
set -g base-index 1


# WINDOW SETTINGS ==========================================================================
# Skip leader on next window and previous window
unbind n
unbind p
bind -n C-n next-window
bind -n C-p previous-window

# New window in current path
unbind c
bind n new-window -c "#{pane_current_path}"

# Automatically renumber windows when one is removed
set -g renumber-windows on

# PANE SETTINGS ============================================================================
# Start pane indices at 1 instead of 0
set -g pane-base-index 1

# All new splits should be in the current working directory of the pane that created them
unbind \"
bind - split-window -v -c "#{pane_current_path}"

unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Use 'm' key to maximise/minimize the current pane (toggle zoom)
bind -r m resize-pane -Z # Toggle zoom for the current pane

# # Unbind ctrl+l from next window and make it clear the screen
# unbind C-l
# bind-key C-l send-keys -R \; clear-history



# PLUGIN MANAGEMENT ========================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator' # for pane navigation using ctrl + vim keys (h,j,k,l)
set -g @plugin 'tmux-plugins/tmux-resurrect' # for saving/restoring tmux sessionsd
set -g @plugin 'tmux-plugins/tmux-continuum' # for auto-saving/restoring sessions


# CATPPUCCIN SETTINGS ======================================================================
# Load catppuccin
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Fix the window naming -- otherwise all inactive windows are named after the host name
set -g @catppuccin_window_current_text  " #{window_name}#{?window_zoomed_flag,🔍,}"
set -g @catppuccin_window_text          " #{window_name}#{?window_zoomed_flag,🔍,}"
set -g @catppuccin_window_default_text  " #{window_name}#{?window_zoomed_flag,🔍,}"


# OTHER PLUGIN SETTINGS ====================================================================
# Capture pane contents for tmux-resurrect
set -g @resurrect-capture-pane-contents 'on'

# Enable tmux-continuum auto-save and restore
set -g @continuum-restore 'on'


# RUN TPM, WHICH WILL RUN THE PLUGINS SPECIFIED ABOVE ======================================
run '~/.tmux/plugins/tpm/tpm'


# FINAL OVERRIDE SETTINGS ==================================================================
# Make highlighted text in copy mode more visible. Must be done after theming
set -g mode-style "fg=black,bg=brightgreen"

# Change the other matches highlight color
set -g copy-mode-match-style "bg=red,fg=black"

# Change the current match style in copy mode
set -g copy-mode-current-match-style "bg=yellow,fg=black"